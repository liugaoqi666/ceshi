<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘高奇的欢迎页面</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f7f1ff, #e0f7ff);
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
            padding: 40px;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #4a148c;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin: 20px 0;
        }
        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #4a148c;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: background 0.3s;
        }
        .button:hover {
            background: #6a1b9a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我叫刘高奇</h1>
        <p>欢迎来到我的小家</p>
        <a class="button" href="home.html">点击进入小家</a>
    </div>
</body>
</html>
