<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container {
            padding-top: 100px;
            text-align: center;
            min-height: 100vh;
        }
        canvas {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 20px auto;
            display: block;
        }
        .score {
            font-size: 24px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .back-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .controls {
            margin-top: 20px;
        }
        .controls button {
            padding: 10px 20px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html">小游戏</a></li>
            </ul>
        </div>
    </nav>

    <div class="game-container">
        <a href="../games.html" class="back-link">← 返回游戏列表</a>
        <h1>🐍 贪吃蛇</h1>
        <p style="color: #aaa;">用方向键或点击按钮控制小蛇，吃食物得分！</p>
        
        <div class="score">得分: <span id="score">0</span></div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button onclick="changeDirection('up')">⬆️</button><br>
            <button onclick="changeDirection('left')">⬅️</button>
            <button onclick="changeDirection('down')">⬇️</button>
            <button onclick="changeDirection('right')">➡️</button>
        </div>
        
        <button class="btn" onclick="initGame()">重新开始</button>
    </div>

    <footer class="footer">
        <p>&copy; 2026 刘高奇的小家 - 个人网站</p>
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, dx, dy, score, gameLoop, gameRunning;

        function initGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            document.getElementById('score').textContent = score;
            gameRunning = false;
            placeFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, 100);
            draw();
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                    return;
                }
            }
        }

        function gameStep() {
            if (!gameRunning) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // 画蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00ff88' : '#00d4ff';
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function changeDirection(direction) {
            if (direction === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (direction === 'down' && dy === 0) { dx = 0; dy = 1; }
            if (direction === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (direction === 'right' && dx === 0) { dx = 1; dy = 0; }
            gameRunning = true;
        }

        function gameOver() {
            clearInterval(gameLoop);
            alert('游戏结束！得分: ' + score);
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });

        initGame();
    </script>
</body>
</html>
