<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商购物 - 刘高奇的小家</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-header {
            padding: 120px 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
        }
        .search-bar input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .search-bar button {
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .category-tag {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
        }
        .category-tag:hover, .category-tag.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
        }
        .cart-btn {
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 购物车弹窗 */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .cart-modal.show {
            display: flex;
        }
        .cart-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-content h2 {
            margin-bottom: 20px;
            color: #00d4ff;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cart-item-icon {
            font-size: 36px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-info h4 {
            margin-bottom: 5px;
        }
        .cart-item-info p {
            color: #ff6b6b;
            font-weight: bold;
        }
        .cart-item-remove {
            background: rgba(255, 107, 107, 0.3);
            border: none;
            color: #ff6b6b;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .cart-total {
            margin-top: 20px;
            text-align: right;
            font-size: 20px;
        }
        .cart-total span {
            color: #ff6b6b;
            font-weight: bold;
        }
        .cart-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .close-modal {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .checkout-btn {
            padding: 10px 30px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        /* 商品详情弹窗 */
        .product-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .product-modal.show {
            display: flex;
        }
        .product-detail {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        .product-detail .detail-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .product-detail h2 {
            margin-bottom: 10px;
        }
        .product-detail .detail-price {
            color: #ff6b6b;
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }
        .product-detail .detail-desc {
            color: #aaa;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .product-detail .detail-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .buy-now-btn {
            padding: 12px 30px;
            background: #ff6b6b;
            border: none;
            border-radius: 25px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">个人介绍</a></li>
                <li><a href="games.html">小游戏</a></li>
                <li><a href="shop.html">电商购物</a></li>
                <li><a href="education.html">教育管理</a></li>
            </ul>
        </div>
    </nav>

    <!-- 电商购物内容 -->
    <div class="shop-header">
        <h1 style="font-size: 36px; margin-bottom: 20px;">🛒 精选商城</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索商品..." oninput="searchProducts()">
            <button onclick="searchProducts()">搜索</button>
            <button class="cart-btn" onclick="showCart()" style="position: relative;">
                🛒 购物车
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
        <div class="categories" id="categories">
            <span class="category-tag active" onclick="filterCategory('all', this)">全部</span>
            <span class="category-tag" onclick="filterCategory('electronics', this)">📱 数码电子</span>
            <span class="category-tag" onclick="filterCategory('clothing', this)">👕 服装</span>
            <span class="category-tag" onclick="filterCategory('food', this)">🍔 美食</span>
            <span class="category-tag" onclick="filterCategory('books', this)">📚 图书</span>
            <span class="category-tag" onclick="filterCategory('home', this)">🏠 家居</span>
        </div>
    </div>

    <div class="shop-section">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <h2>🛒 购物车</h2>
            <div id="cartItems"></div>
            <div class="cart-total">合计: <span id="cartTotal">¥0</span></div>
            <div class="cart-actions">
                <button class="close-modal" onclick="closeCart()">继续购物</button>
                <button class="checkout-btn" onclick="checkout()">去结算</button>
            </div>
        </div>
    </div>

    <!-- 商品详情弹窗 -->
    <div class="product-modal" id="productModal">
        <div class="product-detail">
            <div class="detail-icon" id="detailIcon"></div>
            <h2 id="detailName"></h2>
            <div class="detail-price" id="detailPrice"></div>
            <div class="detail-desc" id="detailDesc"></div>
            <div class="detail-actions">
                <button class="close-modal" onclick="closeProductDetail()">关闭</button>
                <button class="add-to-cart" onclick="addToCartFromDetail()" style="padding: 12px 30px;">加入购物车</button>
                <button class="buy-now-btn" onclick="buyNow()">立即购买</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 刘高奇的小家 - 个人网站</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: 'iPhone 15 Pro', price: 8999, icon: '📱', category: 'electronics', desc: '苹果最新旗舰手机，A17 Pro芯片，钛金属设计，4800万像素主摄像头。' },
            { id: 2, name: 'MacBook Air', price: 9499, icon: '💻', category: 'electronics', desc: 'M3芯片，15.3英寸Liquid Retina显示屏，长达18小时电池续航。' },
            { id: 3, name: 'AirPods Pro', price: 1899, icon: '🎧', category: 'electronics', desc: '主动降噪，自适应透明模式，个性化空间音频。' },
            { id: 4, name: '时尚T恤', price: 129, icon: '👕', category: 'clothing', desc: '100%纯棉面料，舒适透气，多种颜色可选，适合日常穿着。' },
            { id: 5, name: '牛仔裤', price: 299, icon: '👖', category: 'clothing', desc: '经典直筒版型，优质牛仔面料，修身显瘦，百搭款式。' },
            { id: 6, name: '运动鞋', price: 599, icon: '👟', category: 'clothing', desc: '轻量缓震科技，透气网面设计，适合跑步和日常运动。' },
            { id: 7, name: '精选咖啡', price: 89, icon: '☕', category: 'food', desc: '100%阿拉比卡咖啡豆，中度烘焙，口感醇厚，香气浓郁。' },
            { id: 8, name: '进口巧克力', price: 68, icon: '🍫', category: 'food', desc: '比利时进口可可，丝滑口感，精美礼盒包装，送礼佳品。' },
            { id: 9, name: '有机绿茶', price: 158, icon: '🍵', category: 'food', desc: '明前龙井，有机认证，清香回甘，健康饮品首选。' },
            { id: 10, name: 'JavaScript高级编程', price: 89, icon: '📘', category: 'books', desc: '前端开发经典教程，涵盖ES6+新特性，实战案例丰富。' },
            { id: 11, name: '软件测试大全', price: 79, icon: '📗', category: 'books', desc: '全面覆盖功能测试、性能测试、自动化测试等核心技能。' },
            { id: 12, name: 'Python编程入门', price: 69, icon: '📕', category: 'books', desc: '零基础入门Python，从基础语法到项目实战，循序渐进。' },
            { id: 13, name: '智能台灯', price: 199, icon: '💡', category: 'home', desc: '护眼LED光源，色温亮度可调，支持智能语音控制。' },
            { id: 14, name: '加湿器', price: 159, icon: '💨', category: 'home', desc: '超声波雾化技术，静音运行，大容量水箱，智能恒湿。' },
            { id: 15, name: '抱枕靠垫', price: 49, icon: '🛋️', category: 'home', desc: '高弹PP棉填充，亲肤面料，多款式可选，舒适家居必备。' },
        ];

        let cart = [];
        let currentCategory = 'all';
        let currentDetailProduct = null;

        function renderProducts(filter = 'all', search = '') {
            const grid = document.getElementById('productsGrid');
            let filtered = products;
            
            if (filter !== 'all') {
                filtered = filtered.filter(p => p.category === filter);
            }
            if (search) {
                filtered = filtered.filter(p => p.name.includes(search));
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-image" onclick="showProductDetail(${p.id})" style="cursor: pointer;">${p.icon}</div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="product-price">¥${p.price}</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">加入购物车</button>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category, el) {
            currentCategory = category;
            document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderProducts(category, document.getElementById('searchInput').value);
        }

        function searchProducts() {
            const search = document.getElementById('searchInput').value;
            renderProducts(currentCategory, search);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartCount();
            alert(`${product.name} 已加入购物车！`);
        }

        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = total;
        }

        function showCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.add('show');
            renderCartItems();
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('show');
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #aaa; padding: 30px;">购物车是空的</p>';
                document.getElementById('cartTotal').textContent = '¥0';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-icon">${item.icon}</div>
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>¥${item.price} × ${item.quantity}</p>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${item.id})">删除</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            document.getElementById('cartTotal').textContent = '¥' + total;
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartCount();
            renderCartItems();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('购物车是空的！');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            alert(`🎉 订单提交成功！\n合计: ¥${total}\n感谢您的购买！`);
            cart = [];
            updateCartCount();
            closeCart();
        }

        function showProductDetail(productId) {
            currentDetailProduct = products.find(p => p.id === productId);
            document.getElementById('detailIcon').textContent = currentDetailProduct.icon;
            document.getElementById('detailName').textContent = currentDetailProduct.name;
            document.getElementById('detailPrice').textContent = '¥' + currentDetailProduct.price;
            document.getElementById('detailDesc').textContent = currentDetailProduct.desc;
            document.getElementById('productModal').classList.add('show');
        }

        function closeProductDetail() {
            document.getElementById('productModal').classList.remove('show');
        }

        function addToCartFromDetail() {
            if (currentDetailProduct) {
                addToCart(currentDetailProduct.id);
                closeProductDetail();
            }
        }

        function buyNow() {
            if (currentDetailProduct) {
                alert(`🎉 购买成功！\n商品: ${currentDetailProduct.name}\n价格: ¥${currentDetailProduct.price}\n感谢您的购买！`);
                closeProductDetail();
            }
        }

        // 初始化
        renderProducts();
    </script>
</body>
</html>
