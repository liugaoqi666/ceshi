<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商购物 - 刘高奇的小家</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <canvas id="trailCanvas"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="games.html">小游戏</a></li>
                <li><a href="shop.html" class="active">电商购物</a></li>
                <li><a href="education.html">教育管理</a></li>
                <li><a href="sticky.html">便签版</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h1>🛒 精选商城</h1>
            <p>精选商品，优质购物体验</p>
        </div>

        <section class="shop-section">
            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索商品..." oninput="searchProducts()">
                <button class="btn" onclick="searchProducts()">搜索</button>
                <button class="btn btn-outline cart-btn" onclick="showCart()" style="position: relative;">
                    🛒 购物车
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>

            <!-- 分类标签 -->
            <div class="categories" id="categories">
                <span class="category-tag active" onclick="filterCategory('all', this)">全部</span>
                <span class="category-tag" onclick="filterCategory('electronics', this)">📱 数码电子</span>
                <span class="category-tag" onclick="filterCategory('clothing', this)">👕 服装</span>
                <span class="category-tag" onclick="filterCategory('food', this)">🍔 美食</span>
                <span class="category-tag" onclick="filterCategory('books', this)">📚 图书</span>
                <span class="category-tag" onclick="filterCategory('home', this)">🏠 家居</span>
            </div>

            <!-- 商品列表 -->
            <div class="products-grid" id="productsGrid"></div>
        </section>
    </div>

    <!-- 购物车弹窗 -->
    <div class="modal-overlay cart-modal" id="cartModal">
        <div class="cart-content">
            <h2>🛒 购物车</h2>
            <div id="cartItems"></div>
            <div class="cart-total">合计: <span id="cartTotal">¥0</span></div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeCart()">继续购物</button>
                <button class="btn" onclick="checkout()">去结算</button>
            </div>
        </div>
    </div>

    <!-- 商品详情弹窗 -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <div id="detailIcon" style="font-size: 80px; margin-bottom: 15px;"></div>
                <h2 id="detailName"></h2>
                <div id="detailPrice" style="color: var(--accent); font-size: 28px; font-weight: 900; margin: 15px 0;"></div>
                <p id="detailDesc" style="color: #8888aa; line-height: 1.8;"></p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeProductDetail()">关闭</button>
                <button class="btn" onclick="addToCartFromDetail()">加入购物车</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 刘高奇的小家 - 个人网站</p>
    </footer>

    <script>
        // ========== 星空背景 ==========
        (function() {
            const canvas = document.getElementById('starsCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speedY: Math.random() * 0.3 + 0.1, opacity: Math.random() });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.y += s.speedY;
                    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 212, 255, ${s.opacity})`;
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        })();

        // ========== 鼠标拖尾 ==========
        (function() {
            const canvas = document.getElementById('trailCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            document.addEventListener('mousemove', (e) => {
                for (let i = 0; i < 3; i++) {
                    particles.push({ x: e.clientX, y: e.clientY, size: Math.random() * 4 + 1, speedX: (Math.random() - 0.5) * 2, speedY: (Math.random() - 0.5) * 2, life: 1, color: `hsl(${Math.random() * 60 + 180}, 100%, 70%)` });
                }
            });
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.speedX; p.y += p.speedY; p.life -= 0.02; p.size *= 0.98;
                    if (p.life <= 0) { particles.splice(i, 1); continue; }
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill(); ctx.globalAlpha = 1;
                }
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        })();

        // ========== 商品数据 ==========
        const products = [
            { id: 1, name: 'iPhone 15 Pro', price: 8999, icon: '📱', category: 'electronics', desc: '苹果最新旗舰手机，A17 Pro芯片，钛金属设计，4800万像素主摄像头。' },
            { id: 2, name: 'MacBook Air', price: 9499, icon: '💻', category: 'electronics', desc: 'M3芯片，15.3英寸Liquid Retina显示屏，长达18小时电池续航。' },
            { id: 3, name: 'AirPods Pro', price: 1899, icon: '🎧', category: 'electronics', desc: '主动降噪，自适应透明模式，个性化空间音频。' },
            { id: 4, name: '时尚T恤', price: 129, icon: '👕', category: 'clothing', desc: '100%纯棉面料，舒适透气，多种颜色可选，适合日常穿着。' },
            { id: 5, name: '牛仔裤', price: 299, icon: '👖', category: 'clothing', desc: '经典直筒版型，优质牛仔面料，修身显瘦，百搭款式。' },
            { id: 6, name: '运动鞋', price: 599, icon: '👟', category: 'clothing', desc: '轻量缓震科技，透气网面设计，适合跑步和日常运动。' },
            { id: 7, name: '精选咖啡', price: 89, icon: '☕', category: 'food', desc: '100%阿拉比卡咖啡豆，中度烘焙，口感醇厚，香气浓郁。' },
            { id: 8, name: '进口巧克力', price: 68, icon: '🍫', category: 'food', desc: '比利时进口可可，丝滑口感，精美礼盒包装，送礼佳品。' },
            { id: 9, name: '有机绿茶', price: 158, icon: '🍵', category: 'food', desc: '明前龙井，有机认证，清香回甘，健康饮品首选。' },
            { id: 10, name: 'JavaScript高级编程', price: 89, icon: '📘', category: 'books', desc: '前端开发经典教程，涵盖ES6+新特性，实战案例丰富。' },
            { id: 11, name: '软件测试大全', price: 79, icon: '📗', category: 'books', desc: '全面覆盖功能测试、性能测试、自动化测试等核心技能。' },
            { id: 12, name: 'Python编程入门', price: 69, icon: '📕', category: 'books', desc: '零基础入门Python，从基础语法到项目实战，循序渐进。' },
            { id: 13, name: '智能台灯', price: 199, icon: '💡', category: 'home', desc: '护眼LED光源，色温亮度可调，支持智能语音控制。' },
            { id: 14, name: '加湿器', price: 159, icon: '💨', category: 'home', desc: '超声波雾化技术，静音运行，大容量水箱，智能恒湿。' },
            { id: 15, name: '抱枕靠垫', price: 49, icon: '🛋️', category: 'home', desc: '高弹PP棉填充，亲肤面料，多款式可选，舒适家居必备。' },
        ];

        let cart = [];
        let currentCategory = 'all';
        let currentDetailProduct = null;

        // 渲染商品
        function renderProducts(filter = 'all', search = '') {
            const grid = document.getElementById('productsGrid');
            let filtered = products;
            
            if (filter !== 'all') {
                filtered = filtered.filter(p => p.category === filter);
            }
            if (search) {
                filtered = filtered.filter(p => p.name.includes(search));
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-image" onclick="showProductDetail(${p.id})" style="cursor: pointer;">${p.icon}</div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="product-price">¥${p.price}</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">加入购物车</button>
                    </div>
                </div>
            `).join('');
        }

        // 分类筛选
        function filterCategory(category, el) {
            currentCategory = category;
            document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderProducts(category, document.getElementById('searchInput').value);
        }

        // 搜索商品
        function searchProducts() {
            const search = document.getElementById('searchInput').value;
            renderProducts(currentCategory, search);
        }

        // 加入购物车
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartCount();
            alert(`${product.name} 已加入购物车！`);
        }

        // 更新购物车数量
        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = total;
        }

        // 显示购物车
        function showCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.add('show');
            renderCartItems();
        }

        // 关闭购物车
        function closeCart() {
            document.getElementById('cartModal').classList.remove('show');
        }

        // 渲染购物车内容
        function renderCartItems() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #8888aa; padding: 30px;">购物车是空的</p>';
                document.getElementById('cartTotal').textContent = '¥0';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-icon">${item.icon}</div>
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>¥${item.price} × ${item.quantity}</p>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${item.id})">删除</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            document.getElementById('cartTotal').textContent = '¥' + total;
        }

        // 从购物车移除
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartCount();
            renderCartItems();
        }

        // 结算
        function checkout() {
            if (cart.length === 0) {
                alert('购物车是空的！');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            alert(`🎉 订单提交成功！\n合计: ¥${total}\n感谢您的购买！`);
            cart = [];
            updateCartCount();
            closeCart();
        }

        // 显示商品详情
        function showProductDetail(productId) {
            currentDetailProduct = products.find(p => p.id === productId);
            document.getElementById('detailIcon').textContent = currentDetailProduct.icon;
            document.getElementById('detailName').textContent = currentDetailProduct.name;
            document.getElementById('detailPrice').textContent = '¥' + currentDetailProduct.price;
            document.getElementById('detailDesc').textContent = currentDetailProduct.desc;
            document.getElementById('productModal').classList.add('show');
        }

        // 关闭商品详情
        function closeProductDetail() {
            document.getElementById('productModal').classList.remove('show');
        }

        // 从详情加入购物车
        function addToCartFromDetail() {
            if (currentDetailProduct) {
                addToCart(currentDetailProduct.id);
                closeProductDetail();
            }
        }

        // 初始化
        renderProducts();
    </script>
</body>
</html>
