<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便签版 - 刘高奇的小家</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <canvas id="trailCanvas"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="games.html">小游戏</a></li>
                <li><a href="shop.html">电商购物</a></li>
                <li><a href="education.html">教育管理</a></li>
                <li><a href="sticky.html" class="active">便签版</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h1>📝 我的便签版</h1>
            <p>记录你的梦想和想法，刷新页面也不会丢失</p>
        </div>

        <section class="sticky-section">
            <!-- 输入区域 -->
            <div class="sticky-input-area">
                <textarea id="noteInput" placeholder="在这里写下你的梦想、想法、目标...&#10;&#10;例如：我的梦想是成为一名优秀的软件架构师 ✨"></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                    <span style="color: #6666aa; font-size: 12px;">💾 数据自动保存到浏览器本地存储</span>
                    <button class="btn" onclick="addNote()">📌 添加便签</button>
                </div>
            </div>

            <!-- 便签统计 -->
            <div style="display: flex; gap: 20px; margin-bottom: 25px;">
                <div class="stat-card" style="flex: 1; padding: 15px;">
                    <div class="stat-number" id="noteCount" style="font-size: 24px;">0</div>
                    <div class="stat-label">便签总数</div>
                </div>
                <div class="stat-card" style="flex: 1; padding: 15px;">
                    <div class="stat-number" id="todayCount" style="font-size: 24px;">0</div>
                    <div class="stat-label">今日新增</div>
                </div>
                <div class="stat-card" style="flex: 1; padding: 15px;">
                    <button class="btn btn-danger" onclick="clearAllNotes()" style="font-size: 12px; padding: 8px 16px;">🗑️ 清空全部</button>
                    <div class="stat-label" style="margin-top: 8px;">数据管理</div>
                </div>
            </div>

            <!-- 搜索 -->
            <div style="margin-bottom: 25px;">
                <input type="text" id="searchNote" placeholder="🔍 搜索便签内容..." oninput="renderNotes()" style="width: 100%; padding: 14px 24px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text); font-size: 14px; outline: none;">
            </div>

            <!-- 便签列表 -->
            <div class="sticky-notes-list" id="notesList"></div>

            <!-- 空状态 -->
            <div id="emptyState" style="text-align: center; padding: 60px 20px; display: none;">
                <div style="font-size: 64px; margin-bottom: 20px;">📭</div>
                <h3 style="color: #6666aa; margin-bottom: 10px;">还没有便签</h3>
                <p style="color: #4444aa; font-size: 13px;">在上方输入框写下你的第一个梦想吧！</p>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>&copy; 2026 刘高奇的小家 - 个人网站</p>
    </footer>

    <script>
        // ========== 星空背景 ==========
        (function() {
            const canvas = document.getElementById('starsCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speedY: Math.random() * 0.3 + 0.1, opacity: Math.random() });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.y += s.speedY;
                    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 212, 255, ${s.opacity})`;
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        })();

        // ========== 鼠标拖尾 ==========
        (function() {
            const canvas = document.getElementById('trailCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            document.addEventListener('mousemove', (e) => {
                for (let i = 0; i < 3; i++) {
                    particles.push({ x: e.clientX, y: e.clientY, size: Math.random() * 4 + 1, speedX: (Math.random() - 0.5) * 2, speedY: (Math.random() - 0.5) * 2, life: 1, color: `hsl(${Math.random() * 60 + 180}, 100%, 70%)` });
                }
            });
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.speedX; p.y += p.speedY; p.life -= 0.02; p.size *= 0.98;
                    if (p.life <= 0) { particles.splice(i, 1); continue; }
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill(); ctx.globalAlpha = 1;
                }
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        })();

        // ========== 便签功能（localStorage持久化）==========
        const STORAGE_KEY = 'liugaoqi_sticky_notes';
        const icons = ['💡', '🎯', '⭐', '🌟', '💫', '✨', '🔥', '💎', '🌈', '🚀', '💪', '🎨', '📖', '🏆', '🎵'];

        // 从localStorage加载便签
        function loadNotes() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // 保存便签到localStorage
        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        // 添加便签
        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            if (!text) {
                alert('请输入便签内容！');
                return;
            }

            const notes = loadNotes();
            const note = {
                id: Date.now(),
                text: text,
                icon: icons[Math.floor(Math.random() * icons.length)],
                time: new Date().toLocaleString('zh-CN'),
                date: new Date().toLocaleDateString('zh-CN')
            };

            notes.unshift(note);
            saveNotes(notes);
            input.value = '';
            renderNotes();
        }

        // 删除便签
        function deleteNote(id) {
            if (!confirm('确定要删除这条便签吗？')) return;
            let notes = loadNotes();
            notes = notes.filter(n => n.id !== id);
            saveNotes(notes);
            renderNotes();
        }

        // 清空所有便签
        function clearAllNotes() {
            const notes = loadNotes();
            if (notes.length === 0) {
                alert('没有便签可以清空！');
                return;
            }
            if (!confirm(`确定要清空全部 ${notes.length} 条便签吗？此操作不可恢复！`)) return;
            saveNotes([]);
            renderNotes();
        }

        // 渲染便签列表
        function renderNotes() {
            const notes = loadNotes();
            const search = document.getElementById('searchNote').value.trim().toLowerCase();
            const filtered = search ? notes.filter(n => n.text.toLowerCase().includes(search)) : notes;
            const container = document.getElementById('notesList');
            const emptyState = document.getElementById('emptyState');

            // 更新统计
            document.getElementById('noteCount').textContent = notes.length;
            const today = new Date().toLocaleDateString('zh-CN');
            document.getElementById('todayCount').textContent = notes.filter(n => n.date === today).length;

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                if (search && notes.length > 0) {
                    emptyState.innerHTML = `
                        <div style="font-size: 64px; margin-bottom: 20px;">🔍</div>
                        <h3 style="color: #6666aa; margin-bottom: 10px;">没有找到匹配的便签</h3>
                        <p style="color: #4444aa; font-size: 13px;">试试其他关键词</p>
                    `;
                } else {
                    emptyState.innerHTML = `
                        <div style="font-size: 64px; margin-bottom: 20px;">📭</div>
                        <h3 style="color: #6666aa; margin-bottom: 10px;">还没有便签</h3>
                        <p style="color: #4444aa; font-size: 13px;">在上方输入框写下你的第一个梦想吧！</p>
                    `;
                }
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = filtered.map(note => `
                <div class="sticky-note">
                    <div class="note-text">${note.icon} ${escapeHtml(note.text)}</div>
                    <div class="note-time">📅 ${note.time}</div>
                    <button class="note-delete" onclick="deleteNote(${note.id})">✕</button>
                </div>
            `).join('');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Ctrl+Enter 快捷添加
        document.getElementById('noteInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                addNote();
            }
        });

        // 初始化渲染
        renderNotes();
    </script>
</body>
</html>
