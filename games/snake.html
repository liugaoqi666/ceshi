<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container { padding: 120px 20px 60px; text-align: center; min-height: 100vh; }
        canvas#gameCanvas { background: rgba(0,0,30,0.5); border: 1px solid var(--glass-border); border-radius: 10px; margin: 20px auto; display: block; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .controls-row { display: flex; gap: 5px; }
        .ctrl-btn { padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; cursor: pointer; font-size: 18px; transition: all 0.3s; }
        .ctrl-btn:hover { background: rgba(0,212,255,0.2); border-color: var(--primary); }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html" class="active">小游戏</a></li>
            </ul>
        </div>
    </nav>
    <div class="main-content">
        <div class="page-header">
            <h1>🐍 贪吃蛇</h1>
            <p>用方向键或点击按钮控制小蛇，吃食物得分！</p>
        </div>
        <div class="game-container" style="padding-top: 20px;">
            <div style="font-size: 22px; margin: 20px 0;">得分: <span id="score" style="color: var(--primary); font-weight: 900;">0</span></div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="controls">
                <div class="controls-row"><button class="ctrl-btn" onclick="changeDir('up')">⬆️</button></div>
                <div class="controls-row">
                    <button class="ctrl-btn" onclick="changeDir('left')">⬅️</button>
                    <button class="ctrl-btn" onclick="changeDir('down')">⬇️</button>
                    <button class="ctrl-btn" onclick="changeDir('right')">➡️</button>
                </div>
            </div>
            <button class="btn" onclick="initGame()" style="margin-top: 20px;">重新开始</button>
            <a href="../games.html" class="btn btn-outline" style="margin-left: 10px;">返回列表</a>
        </div>
    </div>
    <footer class="footer"><p>&copy; 2026 刘高奇的小家</p></footer>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GS = 20, TC = canvas.width / GS;
        let snake, food, dx, dy, score, loop, running;

        function initGame() {
            snake = [{x:10,y:10}]; dx = 0; dy = 0; score = 0;
            document.getElementById('score').textContent = score;
            running = false; placeFood();
            if (loop) clearInterval(loop);
            loop = setInterval(step, 100); draw();
        }

        function placeFood() {
            food = {x: Math.floor(Math.random()*TC), y: Math.floor(Math.random()*TC)};
            for (let s of snake) if (s.x === food.x && s.y === food.y) { placeFood(); return; }
        }

        function step() {
            if (!running) return;
            const head = {x: snake[0].x+dx, y: snake[0].y+dy};
            if (head.x<0||head.x>=TC||head.y<0||head.y>=TC) { gameOver(); return; }
            for (let s of snake) if (s.x===head.x&&s.y===head.y) { gameOver(); return; }
            snake.unshift(head);
            if (head.x===food.x&&head.y===food.y) { score+=10; document.getElementById('score').textContent=score; placeFood(); }
            else snake.pop();
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,20,0.8)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            // 网格
            ctx.strokeStyle = 'rgba(0,212,255,0.05)';
            for (let i = 0; i < TC; i++) { ctx.beginPath(); ctx.moveTo(i*GS,0); ctx.lineTo(i*GS,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*GS); ctx.lineTo(canvas.width,i*GS); ctx.stroke(); }
            // 食物
            ctx.fillStyle = '#ff6b6b'; ctx.shadowColor = '#ff6b6b'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(food.x*GS+GS/2, food.y*GS+GS/2, GS/2-2, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // 蛇
            snake.forEach((s,i) => {
                ctx.fillStyle = i===0 ? '#00ff88' : '#00d4ff';
                ctx.shadowColor = i===0 ? '#00ff88' : '#00d4ff';
                ctx.shadowBlur = i===0 ? 10 : 5;
                ctx.fillRect(s.x*GS+1, s.y*GS+1, GS-2, GS-2);
            });
            ctx.shadowBlur = 0;
        }

        function changeDir(dir) {
            if (dir==='up'&&dy===0){dx=0;dy=-1;}
            if (dir==='down'&&dy===0){dx=0;dy=1;}
            if (dir==='left'&&dx===0){dx=-1;dy=0;}
            if (dir==='right'&&dx===0){dx=1;dy=0;}
            running = true;
        }

        function gameOver() { clearInterval(loop); alert('游戏结束！得分: '+score); initGame(); }

        document.addEventListener('keydown', e => {
            switch(e.key) { case 'ArrowUp': e.preventDefault(); changeDir('up'); break; case 'ArrowDown': e.preventDefault(); changeDir('down'); break; case 'ArrowLeft': e.preventDefault(); changeDir('left'); break; case 'ArrowRight': e.preventDefault(); changeDir('right'); break; }
        });

        initGame();
    </script>
</body>
</html>
