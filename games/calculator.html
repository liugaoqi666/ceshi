<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container { padding: 120px 20px 60px; text-align: center; min-height: 100vh; }
        .calculator { background: rgba(0,0,30,0.8); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; width: 320px; margin: 30px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .display { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 20px; margin-bottom: 20px; text-align: right; }
        .display .expression { color: #8888aa; font-size: 14px; min-height: 20px; }
        .display .result { font-size: 36px; font-weight: 900; color: var(--primary); }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-calc { padding: 16px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-weight: 700; font-family: inherit; }
        .btn-number { background: rgba(255,255,255,0.08); color: #fff; }
        .btn-number:hover { background: rgba(255,255,255,0.15); }
        .btn-operator { background: rgba(0,212,255,0.2); color: var(--primary); }
        .btn-operator:hover { background: rgba(0,212,255,0.35); }
        .btn-clear { background: rgba(255,107,107,0.2); color: var(--accent); }
        .btn-clear:hover { background: rgba(255,107,107,0.35); }
        .btn-equals { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; grid-column: span 2; }
        .btn-equals:hover { box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
        .btn-calc:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html" class="active">小游戏</a></li>
            </ul>
        </div>
    </nav>
    <div class="main-content">
        <div class="page-header">
            <h1>🧮 计算器</h1>
            <p>支持基本的四则运算</p>
        </div>
        <div class="game-container" style="padding-top: 0;">
            <div class="calculator">
                <div class="display">
                    <div class="expression" id="expression"></div>
                    <div class="result" id="result">0</div>
                </div>
                <div class="buttons">
                    <button class="btn-calc btn-clear" onclick="clearAll()">AC</button>
                    <button class="btn-calc btn-clear" onclick="backspace()">⌫</button>
                    <button class="btn-calc btn-operator" onclick="addOp('%')">%</button>
                    <button class="btn-calc btn-operator" onclick="addOp('/')">÷</button>
                    <button class="btn-calc btn-number" onclick="addNum('7')">7</button>
                    <button class="btn-calc btn-number" onclick="addNum('8')">8</button>
                    <button class="btn-calc btn-number" onclick="addNum('9')">9</button>
                    <button class="btn-calc btn-operator" onclick="addOp('*')">×</button>
                    <button class="btn-calc btn-number" onclick="addNum('4')">4</button>
                    <button class="btn-calc btn-number" onclick="addNum('5')">5</button>
                    <button class="btn-calc btn-number" onclick="addNum('6')">6</button>
                    <button class="btn-calc btn-operator" onclick="addOp('-')">−</button>
                    <button class="btn-calc btn-number" onclick="addNum('1')">1</button>
                    <button class="btn-calc btn-number" onclick="addNum('2')">2</button>
                    <button class="btn-calc btn-number" onclick="addNum('3')">3</button>
                    <button class="btn-calc btn-operator" onclick="addOp('+')">+</button>
                    <button class="btn-calc btn-number" onclick="addNum('0')">0</button>
                    <button class="btn-calc btn-number" onclick="addNum('.')">.</button>
                    <button class="btn-calc btn-equals" onclick="calculate()">=</button>
                </div>
            </div>
            <a href="../games.html" class="btn btn-outline" style="margin-top: 20px;">返回列表</a>
        </div>
    </div>
    <footer class="footer"><p>&copy; 2026 刘高奇的小家</p></footer>
    <script>
        let cur = '0', exp = '', last = null, isNew = true;
        function upd() { document.getElementById('result').textContent = cur; document.getElementById('expression').textContent = exp; }
        function addNum(n) { if (isNew) { cur = n === '.' ? '0.' : n; isNew = false; } else { if (n === '.' && cur.includes('.')) return; cur += n; } upd(); }
        function addOp(op) { exp = (last !== null ? last : cur) + ' ' + op + ' '; last = parseFloat(cur); isNew = true; upd(); }
        function calculate() { if (!exp) return; exp += cur; try { let r = eval(exp); cur = isFinite(r) ? parseFloat(r.toFixed(10)).toString() : '错误'; } catch(e) { cur = '错误'; } exp = ''; last = null; isNew = true; upd(); }
        function clearAll() { cur = '0'; exp = ''; last = null; isNew = true; upd(); }
        function backspace() { if (cur.length > 1) cur = cur.slice(0, -1); else { cur = '0'; isNew = true; } upd(); }
    </script>
</body>
</html>
