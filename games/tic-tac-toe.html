<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container {
            padding-top: 100px;
            text-align: center;
            min-height: 100vh;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            margin: 30px auto;
            width: fit-content;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .cell.x {
            color: #00d4ff;
        }
        .cell.o {
            color: #ff6b6b;
        }
        .status {
            font-size: 24px;
            margin: 20px 0;
            min-height: 36px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .back-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html">小游戏</a></li>
            </ul>
        </div>
    </nav>

    <div class="game-container">
        <a href="../games.html" class="back-link">← 返回游戏列表</a>
        <h1>⭕❌ 井字棋</h1>
        <p style="color: #aaa;">和电脑对战，看看谁能赢！</p>
        
        <div class="status" id="status">你的回合 (X)</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <button class="btn" onclick="resetGame()">重新开始</button>
    </div>

    <footer class="footer">
        <p>&copy; 2026 刘高奇的小家 - 个人网站</p>
    </footer>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let currentPlayer = 'X';

        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        cells.forEach(cell => cell.addEventListener('click', handleClick));

        function handleClick(e) {
            const index = e.target.dataset.index;
            if (board[index] !== '' || !gameActive) return;

            board[index] = 'X';
            e.target.textContent = 'X';
            e.target.classList.add('x');

            if (checkWin('X')) {
                statusDisplay.textContent = '🎉 你赢了！';
                gameActive = false;
                return;
            }

            if (board.every(cell => cell !== '')) {
                statusDisplay.textContent = '🤝 平局！';
                gameActive = false;
                return;
            }

            statusDisplay.textContent = '电脑思考中...';
            setTimeout(computerMove, 500);
        }

        function computerMove() {
            let available = board.map((cell, i) => cell === '' ? i : null).filter(i => i !== null);
            if (available.length === 0) return;

            const randomIndex = available[Math.floor(Math.random() * available.length)];
            board[randomIndex] = 'O';
            cells[randomIndex].textContent = 'O';
            cells[randomIndex].classList.add('o');

            if (checkWin('O')) {
                statusDisplay.textContent = '😢 电脑赢了！';
                gameActive = false;
                return;
            }

            if (board.every(cell => cell !== '')) {
                statusDisplay.textContent = '🤝 平局！';
                gameActive = false;
                return;
            }

            statusDisplay.textContent = '你的回合 (X)';
        }

        function checkWin(player) {
            return winConditions.some(condition => {
                return condition.every(index => board[index] === player);
            });
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            statusDisplay.textContent = '你的回合 (X)';
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o');
            });
        }
    </script>
</body>
</html>
