<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜拳游戏 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container { padding: 120px 20px 60px; text-align: center; min-height: 100vh; }
        .choices { display: flex; justify-content: center; gap: 30px; margin: 40px 0; }
        .choice-btn { width: 120px; height: 120px; border-radius: 50%; background: var(--glass); border: 2px solid var(--glass-border); font-size: 48px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .choice-btn:hover { transform: scale(1.1); border-color: var(--primary); background: rgba(0,212,255,0.15); box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        .battle-area { display: flex; justify-content: center; align-items: center; gap: 50px; margin: 30px 0; }
        .player-choice, .computer-choice { width: 150px; height: 150px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 72px; }
        .vs { font-size: 36px; color: var(--accent); font-weight: 900; }
        .result-display { font-size: 28px; margin: 20px 0; min-height: 42px; color: var(--primary); }
        .score-board { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .score-item { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 25px; border-radius: 12px; font-size: 14px; }
        .score-item span { color: var(--primary); font-weight: 900; font-size: 20px; }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html" class="active">小游戏</a></li>
            </ul>
        </div>
    </nav>
    <div class="main-content">
        <div class="page-header">
            <h1>✂️ 猜拳游戏</h1>
            <p>石头剪刀布，和电脑一决高下！</p>
        </div>
        <div class="game-container" style="padding-top: 0;">
            <div class="score-board">
                <div class="score-item">你赢<br><span id="playerScore">0</span></div>
                <div class="score-item">平局<br><span id="drawScore">0</span></div>
                <div class="score-item">电脑赢<br><span id="computerScore">0</span></div>
            </div>
            <div class="choices">
                <button class="choice-btn" onclick="play('rock')">✊</button>
                <button class="choice-btn" onclick="play('scissors')">✌️</button>
                <button class="choice-btn" onclick="play('paper')">🖐️</button>
            </div>
            <div class="battle-area">
                <div class="player-choice" id="playerDisplay">❓</div>
                <div class="vs">VS</div>
                <div class="computer-choice" id="computerDisplay">❓</div>
            </div>
            <div class="result-display" id="result"></div>
            <button class="btn" onclick="resetScore()">重置分数</button>
            <a href="../games.html" class="btn btn-outline" style="margin-left: 10px;">返回列表</a>
        </div>
    </div>
    <footer class="footer"><p>&copy; 2026 刘高奇的小家</p></footer>
    <script>
        const emojis = { rock: '✊', scissors: '✌️', paper: '🖐️' };
        let pw = 0, cw = 0, dr = 0;

        function play(pc) {
            const cc = ['rock','scissors','paper'][Math.floor(Math.random()*3)];
            document.getElementById('playerDisplay').textContent = emojis[pc];
            document.getElementById('computerDisplay').textContent = emojis[cc];
            let r = '';
            if (pc === cc) { r = '🤝 平局！'; dr++; }
            else if ((pc==='rock'&&cc==='scissors')||(pc==='scissors'&&cc==='paper')||(pc==='paper'&&cc==='rock')) { r = '🎉 你赢了！'; pw++; }
            else { r = '😢 电脑赢了！'; cw++; }
            document.getElementById('result').textContent = r;
            document.getElementById('playerScore').textContent = pw;
            document.getElementById('computerScore').textContent = cw;
            document.getElementById('drawScore').textContent = dr;
        }

        function resetScore() {
            pw = cw = dr = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('drawScore').textContent = '0';
            document.getElementById('playerDisplay').textContent = '❓';
            document.getElementById('computerDisplay').textContent = '❓';
            document.getElementById('result').textContent = '';
        }
    </script>
</body>
</html>
