<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container { padding: 120px 20px 60px; text-align: center; min-height: 100vh; }
        .board-2048 { display: grid; grid-template-columns: repeat(4, 90px); grid-template-rows: repeat(4, 90px); gap: 10px; margin: 30px auto; width: fit-content; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .tile { width: 90px; height: 90px; background: rgba(255,255,255,0.08); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; transition: all 0.15s; }
        .tile[data-value="2"] { background: rgba(0,212,255,0.15); color: #00d4ff; }
        .tile[data-value="4"] { background: rgba(0,212,255,0.25); color: #00d4ff; }
        .tile[data-value="8"] { background: rgba(0,255,136,0.25); color: #00ff88; }
        .tile[data-value="16"] { background: rgba(0,255,136,0.4); color: #00ff88; }
        .tile[data-value="32"] { background: rgba(255,217,61,0.3); color: #ffd93d; }
        .tile[data-value="64"] { background: rgba(255,217,61,0.5); color: #ffd93d; }
        .tile[data-value="128"] { background: rgba(255,107,107,0.3); color: #ff6b6b; font-size: 24px; }
        .tile[data-value="256"] { background: rgba(255,107,107,0.4); color: #ff6b6b; font-size: 24px; }
        .tile[data-value="512"] { background: rgba(255,107,107,0.5); color: #ff6b6b; font-size: 24px; }
        .tile[data-value="1024"] { background: rgba(108,92,231,0.4); color: #6c5ce7; font-size: 20px; }
        .tile[data-value="2048"] { background: rgba(0,212,255,0.5); color: #fff; font-size: 20px; }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html" class="active">小游戏</a></li>
            </ul>
        </div>
    </nav>
    <div class="main-content">
        <div class="page-header">
            <h1>2️⃣0️⃣4️⃣8️⃣</h1>
            <p>用方向键滑动方块，合并相同数字，挑战2048！</p>
        </div>
        <div class="game-container" style="padding-top: 20px;">
            <div style="font-size: 24px; margin-bottom: 20px;">得分: <span id="score" style="color: var(--primary); font-weight: 900;">0</span></div>
            <div class="board-2048" id="board"></div>
            <button class="btn" onclick="initGame()" style="margin-top: 20px;">重新开始</button>
            <a href="../games.html" class="btn btn-outline" style="margin-left: 10px;">返回列表</a>
        </div>
    </div>
    <footer class="footer"><p>&copy; 2026 刘高奇的小家</p></footer>
    <script>
        let grid = [], score = 0;
        function initGame() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0; document.getElementById('score').textContent = score;
            addRandom(); addRandom(); render();
        }
        function addRandom() {
            let empty = [];
            for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (grid[r][c] === 0) empty.push({r, c});
            if (!empty.length) return;
            let {r, c} = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }
        function render() {
            const board = document.getElementById('board'); board.innerHTML = '';
            for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
                const tile = document.createElement('div'); tile.className = 'tile';
                tile.dataset.value = grid[r][c]; tile.textContent = grid[r][c] || '';
                board.appendChild(tile);
            }
        }
        function move(dir) {
            let moved = false, old = grid.map(r => [...r]);
            if (dir === 'left' || dir === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v);
                    if (dir === 'right') row.reverse();
                    for (let i = 0; i < row.length - 1; i++) { if (row[i] === row[i+1]) { row[i] *= 2; score += row[i]; row.splice(i+1, 1); } }
                    while (row.length < 4) row.push(0);
                    if (dir === 'right') row.reverse();
                    grid[r] = row;
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = []; for (let r = 0; r < 4; r++) col.push(grid[r][c]);
                    if (dir === 'down') col.reverse();
                    col = col.filter(v => v);
                    for (let i = 0; i < col.length - 1; i++) { if (col[i] === col[i+1]) { col[i] *= 2; score += col[i]; col.splice(i+1, 1); } }
                    while (col.length < 4) col.push(0);
                    if (dir === 'down') col.reverse();
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            }
            for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (grid[r][c] !== old[r][c]) moved = true;
            if (moved) { addRandom(); document.getElementById('score').textContent = score; render(); checkOver(); }
        }
        function checkOver() {
            for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
                if (!grid[r][c]) return;
                if (c < 3 && grid[r][c] === grid[r][c+1]) return;
                if (r < 3 && grid[r][c] === grid[r+1][c]) return;
            }
            setTimeout(() => alert('游戏结束！得分: ' + score), 300);
        }
        document.addEventListener('keydown', e => {
            switch(e.key) { case 'ArrowLeft': e.preventDefault(); move('left'); break; case 'ArrowRight': e.preventDefault(); move('right'); break; case 'ArrowUp': e.preventDefault(); move('up'); break; case 'ArrowDown': e.preventDefault(); move('down'); break; }
        });
        initGame();
    </script>
</body>
</html>
