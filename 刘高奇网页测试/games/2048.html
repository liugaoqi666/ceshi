<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 刘高奇的小家</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-container {
            padding-top: 100px;
            text-align: center;
            min-height: 100vh;
        }
        .board-2048 {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            grid-template-rows: repeat(4, 90px);
            gap: 10px;
            margin: 30px auto;
            width: fit-content;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
        }
        .tile {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.15s;
        }
        .tile[data-value="2"] { background: rgba(238, 228, 218, 0.8); color: #776e65; }
        .tile[data-value="4"] { background: rgba(237, 224, 200, 0.8); color: #776e65; }
        .tile[data-value="8"] { background: rgba(242, 177, 121, 0.8); color: #fff; }
        .tile[data-value="16"] { background: rgba(245, 149, 99, 0.8); color: #fff; }
        .tile[data-value="32"] { background: rgba(246, 124, 95, 0.8); color: #fff; }
        .tile[data-value="64"] { background: rgba(246, 94, 59, 0.8); color: #fff; }
        .tile[data-value="128"] { background: rgba(237, 207, 114, 0.8); color: #fff; font-size: 24px; }
        .tile[data-value="256"] { background: rgba(237, 204, 97, 0.8); color: #fff; font-size: 24px; }
        .tile[data-value="512"] { background: rgba(237, 200, 80, 0.8); color: #fff; font-size: 24px; }
        .tile[data-value="1024"] { background: rgba(237, 197, 63, 0.8); color: #fff; font-size: 20px; }
        .tile[data-value="2048"] { background: rgba(237, 194, 46, 0.8); color: #fff; font-size: 20px; }
        .score-display {
            font-size: 24px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn:hover { transform: scale(1.05); }
        .back-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏠 刘高奇的小家</a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../games.html">小游戏</a></li>
            </ul>
        </div>
    </nav>

    <div class="game-container">
        <a href="../games.html" class="back-link">← 返回游戏列表</a>
        <h1>2️⃣0️⃣4️⃣8️⃣</h1>
        <p style="color: #aaa;">用方向键滑动方块，合并相同数字，挑战2048！</p>
        
        <div class="score-display">得分: <span id="score">0</span></div>
        
        <div class="board-2048" id="board"></div>
        
        <button class="btn" onclick="initGame()">重新开始</button>
    </div>

    <footer class="footer">
        <p>&copy; 2026 刘高奇的小家 - 个人网站</p>
    </footer>

    <script>
        let grid = [];
        let score = 0;

        function initGame() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            document.getElementById('score').textContent = score;
            addRandom();
            addRandom();
            render();
        }

        function addRandom() {
            let empty = [];
            for (let r = 0; r < 4; r++)
                for (let c = 0; c < 4; c++)
                    if (grid[r][c] === 0) empty.push({ r, c });
            if (empty.length === 0) return;
            let { r, c } = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.value = grid[r][c];
                    tile.textContent = grid[r][c] || '';
                    board.appendChild(tile);
                }
            }
        }

        function move(direction) {
            let moved = false;
            let oldGrid = grid.map(row => [...row]);

            if (direction === 'left') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v !== 0);
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i + 1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i + 1, 1);
                        }
                    }
                    while (row.length < 4) row.push(0);
                    grid[r] = row;
                }
            } else if (direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v !== 0);
                    for (let i = row.length - 1; i > 0; i--) {
                        if (row[i] === row[i - 1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i - 1, 1);
                        }
                    }
                    while (row.length < 4) row.unshift(0);
                    grid[r] = row;
                }
            } else if (direction === 'up') {
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) col.push(grid[r][c]);
                    col = col.filter(v => v !== 0);
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i + 1, 1);
                        }
                    }
                    while (col.length < 4) col.push(0);
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            } else if (direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) col.push(grid[r][c]);
                    col = col.filter(v => v !== 0);
                    for (let i = col.length - 1; i > 0; i--) {
                        if (col[i] === col[i - 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i - 1, 1);
                        }
                    }
                    while (col.length < 4) col.unshift(0);
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            }

            for (let r = 0; r < 4; r++)
                for (let c = 0; c < 4; c++)
                    if (grid[r][c] !== oldGrid[r][c]) moved = true;

            if (moved) {
                addRandom();
                document.getElementById('score').textContent = score;
                render();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++)
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return;
                }
            setTimeout(() => alert('游戏结束！得分: ' + score), 300);
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowLeft': e.preventDefault(); move('left'); break;
                case 'ArrowRight': e.preventDefault(); move('right'); break;
                case 'ArrowUp': e.preventDefault(); move('up'); break;
                case 'ArrowDown': e.preventDefault(); move('down'); break;
            }
        });

        initGame();
    </script>
</body>
</html>
